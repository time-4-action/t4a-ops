# T4A Admin Dashboard
# Server path: /data/stack/apps/time-4-action/admin/
# Port: 3005
# Domain: admin.time-4-action.com

services:
  t4a-admin:
    image: etiamsi/t4a-admin:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME
        - NEXT_PUBLIC_AI_ROLE_NAME
        - NEXT_PUBLIC_EUR_USD_RATE
    ports:
      - "3005:3005"
    env_file:
      - .env.local
    environment:
      PORT: 3005
      AUTH0_BASE_URL: ${AUTH0_BASE_URL:-https://admin.time-4-action.com}
    restart: unless-stopped
